<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>F2P · Files to Picture</title>
  </head>
  <body>
    <div class="c">
      <h1>📦 F2P <small>Files to Picture</small></h1>
      <div class="sub">打包隐写不压缩，文件直写 BMP 像素。</div>

      <div class="toast-container" id="toastContainer"></div>

      <div class="top-bar">
        <div class="mode-tabs">
          <button class="mode-btn active" data-mode="enc" id="tabEnc">
            🔒 编码
          </button>
          <button class="mode-btn" data-mode="dec" id="tabDec">🔓 解码</button>
        </div>
        <div class="chunk-select">
          <label>读取分块</label>
          <select id="chunkSize">
            <option value="64" selected>64 KB</option>
            <option value="256">256 KB</option>
            <option value="1024">1 MB</option>
            <option value="2048">2 MB</option>
            <option value="3072">3 MB</option>
            <option value="4096">4 MB</option>
            <option value="6144">6 MB</option>
            <option value="8192">8 MB</option>
            <option value="12288">12 MB</option>
            <option value="16384">16 MB</option>
            <option value="24576">24 MB</option>
            <option value="32768">32 MB</option>
            <option value="49152">48 MB</option>
            <option value="65536">64 MB</option>
            <option value="98304">96 MB</option>
            <option value="131072">128 MB</option>
            <option value="196608">192 MB</option>
            <option value="262144">256 MB</option>
            <option value="393216">384 MB</option>
            <option value="524288">512 MB</option>
            <option value="786432">768 MB</option>
            <option value="1048576">1024 MB</option>
            <option value="1572864">1536 MB</option>
            <option value="2097152">2048 MB</option>
            <option value="3145728">3072 MB</option>
            <option value="3932160">3840 MB</option>
          </select>
          <span id="memHint" class="mem-hint"></span>
        </div>
      </div>

      <!-- ═══ 编码 ═══ -->
      <div id="encSection" class="section">
        <div class="card">
          <label>📂 选择文件</label>
          <div class="drop-zone" id="encDrop">
            <input type="file" id="encInput" multiple />
            <div class="icon">📁</div>
            <div class="text">拖放文件，或点击选择</div>
            <div class="hint">支持任意格式，可追加</div>
          </div>
          <div class="file-list" id="fileList" style="display: none"></div>
          <div class="btn-group">
            <button class="btn" id="encBtn" disabled>🎨 生成图片</button>
            <button class="btn-ghost" id="clearBtn">✕ 清空</button>
          </div>
          <div class="enc-pwd" id="encPwdArea">
            <input
              type="text"
              id="encPwdInput"
              class="pwd-input"
              placeholder="输入密码（留空以空字符串加密）"
            />
            <label class="pwd-toggle"
              ><input type="checkbox" id="encNameEncCb" /> 🔒
              同时加密文件名</label
            >
          </div>
          <div class="progress-wrap" id="encProg">
            <div class="progress-bar" id="encBar"></div>
          </div>
          <div class="status" id="encStatus">等待文件选择…</div>
          <div class="result-box" id="encResult">
            <div class="info">
              <span id="imgInfo">-</span>
              <a href="#" id="dlLink" class="dl-link" download>⬇️ 下载</a>
            </div>
          </div>
        </div>
      </div>

      <!-- ═══ 解码 ═══ -->
      <div id="decSection" class="section" style="display: none">
        <div class="card">
          <label>📤 上传隐写图片</label>
          <div class="drop-zone" id="decDrop">
            <input type="file" id="decInput" />
            <div class="icon">🖼️</div>
            <div class="text" id="decText">拖放图片，或点击选择</div>
            <div class="hint" id="decHint">通过文件头自动识别</div>
          </div>
          <div class="btn-group">
            <button class="btn" id="decBtn" disabled>🔎 提取</button>
            <button class="btn-ghost" id="decClearBtn">✕ 清空</button>
          </div>
          <div class="dec-pwd" id="decPwdArea">
            <input
              type="text"
              id="decPwdInput"
              class="pwd-input"
              placeholder="输入密码（留空用空字符串解密）"
            />
          </div>
          <div class="progress-wrap" id="decProg">
            <div class="progress-bar" id="decBar"></div>
          </div>
          <div class="status" id="decStatus">等待图片上传…</div>
          <div class="result-box" id="decResult">
            <div style="font-size: 0.8rem; color: #aaa; margin-bottom: 6px">
              📄 提取的文件
            </div>
            <div
              class="file-list"
              id="decFiles"
              style="max-height: 320px"
            ></div>
          </div>
        </div>
      </div>

      <div class="note">BMP 直写直读，文件不经过服务器。</div>
    </div>
  </body>
</html>
